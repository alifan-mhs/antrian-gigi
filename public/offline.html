<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Tidak Ada Koneksi</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #092F54;
    color: #fff;
    text-align: center;
  }
  .card {
    max-width: 360px;
  }
  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    display: block;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
  }
  p {
    margin: 0 0 20px;
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    line-height: 1.5;
  }
  button {
    background: #F3C623;
    color: #092F54;
    border: none;
    border-radius: 999px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icons/icon-192.png" alt="" />
    <h1>Tidak ada koneksi internet</h1>
    <p>Halaman ini butuh koneksi internet untuk memuat data pendaftaran terbaru. Silakan cek koneksi Anda lalu coba lagi.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
